<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Cayman Islands – Master Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root{--ocean:#0a3d5c;--teal:#1a7a8a;--gold:#c9a227;--coral:#e05c3a;--white:#fefcf8;--dark:#0d1f2d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Source Serif 4',Georgia,serif;background:var(--ocean);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 80%,rgba(26,122,138,.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(201,162,39,.15) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .waves{position:fixed;bottom:0;left:0;right:0;height:120px;opacity:.15;pointer-events:none;z-index:0;}
  .card{position:relative;z-index:1;background:var(--white);border-radius:4px;max-width:760px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 1px rgba(201,162,39,.3);overflow:hidden;animation:cardIn .6s cubic-bezier(.16,1,.3,1) forwards;}
  @keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

  /* START SCREEN */
  .start-screen{padding:48px 36px;text-align:center;}
  .start-icon{font-size:4rem;margin-bottom:16px;}
  .start-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--ocean);margin-bottom:8px;}
  .start-sub{font-size:1rem;color:#555;font-style:italic;margin-bottom:24px;line-height:1.6;}
  .start-total{font-family:'Playfair Display',serif;font-size:0.85rem;color:var(--teal);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:28px;}
  .count-selector{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:32px;}
  .count-btn{background:none;border:2px solid #ddd;border-radius:4px;padding:10px 20px;font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;color:#666;cursor:pointer;transition:all 0.18s ease;}
  .count-btn:hover,.count-btn.selected{border-color:var(--teal);background:rgba(26,122,138,0.1);color:var(--teal);}
  .start-btn{background:var(--ocean);color:var(--white);border:none;padding:14px 40px;border-radius:3px;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s ease;}
  .start-btn:hover{background:var(--teal);transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,122,138,.4);}

  /* QUIZ HEADER */
  .card-header{background:var(--ocean);padding:24px 36px 20px;border-bottom:3px solid var(--gold);position:relative;display:none;}
  .card-header.show{display:block;}
  .card-header::after{content:'🏝️';position:absolute;right:36px;top:50%;transform:translateY(-50%);font-size:1.8rem;opacity:.5;}
  .quiz-title{font-family:'Playfair Display',serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2px;}
  h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--white);font-weight:900;}
  .progress-bar-wrap{background:rgba(255,255,255,.1);height:4px;border-radius:2px;margin-top:14px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:2px;transition:width .5s ease;}
  .progress-text{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:6px;letter-spacing:.05em;font-style:italic;}

  /* CARD BODY */
  .card-body{padding:28px 36px 20px;display:none;}
  .card-body.show{display:block;}
  .question-num{font-family:'Playfair Display',serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
  .source-tag{display:inline-block;background:rgba(201,162,39,0.12);color:#8a6a00;font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:2px 10px;border-radius:20px;margin-bottom:8px;font-family:'Playfair Display',serif;font-weight:700;border:1px solid rgba(201,162,39,0.3);}
  .question-text{font-size:1.05rem;font-weight:600;color:var(--dark);line-height:1.55;margin-bottom:20px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .option-btn{background:none;border:1.5px solid #ddd;border-radius:3px;padding:11px 15px;text-align:left;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.9rem;color:var(--dark);transition:all .18s ease;display:flex;align-items:flex-start;gap:12px;line-height:1.4;}
  .option-btn:hover:not(:disabled){border-color:var(--teal);background:rgba(26,122,138,.05);transform:translateX(4px);}
  .option-letter{font-family:'Playfair Display',serif;font-weight:700;font-size:.78rem;color:var(--teal);min-width:18px;padding-top:2px;flex-shrink:0;}
  .option-btn.correct{border-color:#2a7a4a;background:rgba(42,122,74,.1);color:#1a5c34;}
  .option-btn.correct .option-letter{color:#2a7a4a;}
  .option-btn.wrong{border-color:var(--coral);background:rgba(224,92,58,.08);color:#a83520;}
  .option-btn.wrong .option-letter{color:var(--coral);}
  .option-btn:disabled{cursor:default;transform:none;}
  .feedback{margin-top:14px;padding:11px 15px;border-radius:3px;font-size:.87rem;font-style:italic;display:none;line-height:1.5;}
  .feedback.show{display:block;}
  .feedback.correct-fb{background:rgba(42,122,74,.1);color:#1a5c34;border-left:3px solid #2a7a4a;}
  .feedback.wrong-fb{background:rgba(224,92,58,.08);color:#a83520;border-left:3px solid var(--coral);}

  /* FOOTER */
  .card-footer{padding:16px 36px 24px;display:none;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,.08);}
  .card-footer.show{display:flex;}
  .score-badge{font-family:'Playfair Display',serif;font-size:.8rem;color:var(--teal);font-weight:700;}
  .next-btn{background:var(--ocean);color:var(--white);border:none;padding:11px 26px;border-radius:3px;font-family:'Playfair Display',serif;font-size:.85rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s ease;display:none;}
  .next-btn:hover{background:var(--teal);transform:translateY(-2px);}
  .next-btn.show{display:block;}

  /* RESULTS */
  .results-screen{display:none;padding:48px 36px;text-align:center;}
  .results-screen.show{display:block;}
  .result-icon{font-size:4rem;margin-bottom:16px;}
  .result-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--ocean);margin-bottom:8px;}
  .result-score{font-size:3.5rem;font-family:'Playfair Display',serif;font-weight:900;color:var(--gold);margin:16px 0 8px;}
  .result-sub{font-size:1rem;color:#666;font-style:italic;margin-bottom:12px;}
  .result-breakdown{font-size:.85rem;color:#888;margin-bottom:28px;line-height:1.8;}
  .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .restart-btn{background:var(--ocean);color:var(--white);border:none;padding:12px 28px;border-radius:3px;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .2s ease;}
  .restart-btn:hover{background:var(--teal);transform:translateY(-2px);}
  .restart-btn.outline{background:none;border:2px solid var(--ocean);color:var(--ocean);}
  .restart-btn.outline:hover{background:var(--ocean);color:var(--white);}

  @media(max-width:560px){
    body{padding:0;align-items:flex-start;}
    .card{border-radius:0;min-height:100vh;box-shadow:none;}
    .card-header,.card-body,.card-footer,.start-screen,.results-screen{padding-left:20px;padding-right:20px;}
    .card-header{padding-top:env(safe-area-inset-top, 20px);}
    .start-screen{padding-top:calc(env(safe-area-inset-top, 0px) + 36px);padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 36px);}
    .results-screen{padding-top:calc(env(safe-area-inset-top, 0px) + 36px);padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 36px);}
    .question-text{font-size:1rem;line-height:1.6;}
    .start-title{font-size:1.6rem;}
    .start-icon{font-size:3rem;}
    .option-btn{padding:14px 14px;font-size:.95rem;min-height:48px;-webkit-tap-highlight-color:transparent;}
    .option-btn:hover:not(:disabled){transform:none;}
    .next-btn{padding:14px 24px;font-size:.9rem;min-height:48px;}
    .start-btn{padding:16px 36px;font-size:1rem;min-height:52px;width:100%;max-width:320px;}
    .count-btn{padding:12px 18px;font-size:.9rem;min-height:44px;min-width:60px;}
    .card-footer{padding:14px 20px calc(env(safe-area-inset-bottom, 0px) + 14px);position:sticky;bottom:0;background:var(--white);z-index:10;box-shadow:0 -2px 10px rgba(0,0,0,.08);}
    .result-score{font-size:2.8rem;}
    .result-title{font-size:1.6rem;}
    .restart-btn{padding:13px 22px;min-height:48px;}
    .card-header::after{display:none;}
    h1{font-size:1.1rem;}
  }
</style>
</head>

</script>
<script>
var selectedCount = 30;
var questions = [];
var current = 0, score = 0, answered = false;
var scoreBySource = {};

function selectCount(n, el) {
  selectedCount = n;
  var btns = document.querySelectorAll('.count-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('selected');
  el.classList.add('selected');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startQuiz() {
  var pool = shuffle(allQuestions);
  questions = selectedCount === 0 ? pool : pool.slice(0, selectedCount);
  current = 0; score = 0; answered = false; scoreBySource = {};
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('cardHeader').className = 'card-header show';
  document.getElementById('cardBody').className = 'card-body show';
  document.getElementById('cardFooter').className = 'card-footer show';
  loadQuestion();
}

function loadQuestion() {
  var q = questions[current], total = questions.length;
  document.getElementById('questionNum').textContent = 'Question ' + (current + 1);
  document.getElementById('sourceTag').textContent = q.source || '';
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('progressBar').style.width = ((current / total) * 100) + '%';
  document.getElementById('progressText').textContent = 'Question ' + (current+1) + ' of ' + total;
  document.getElementById('scoreBadge').textContent = 'Score: ' + score + ' / ' + current;
  var container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  var letters = ['a','b','c','d','e','f'];
  for (var i = 0; i < q.opts.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = '<span class="option-letter">' + letters[idx] + '.</span><span>' + q.opts[idx] + '</span>';
      btn.addEventListener('click', function() { selectAnswer(idx, btn); });
      container.appendChild(btn);
    })(i);
  }
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('nextBtn').className = 'next-btn';
  answered = false;
}

function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  var q = questions[current];
  var buttons = document.querySelectorAll('.option-btn');
  for (var i = 0; i < buttons.length; i++) buttons[i].disabled = true;
  var feedback = document.getElementById('feedback');
  if (!scoreBySource[q.source]) scoreBySource[q.source] = {correct:0, total:0};
  scoreBySource[q.source].total++;
  if (idx === q.ans) {
    btn.classList.add('correct'); score++;
    scoreBySource[q.source].correct++;
    feedback.textContent = 'Correct! Well done.';
    feedback.className = 'feedback correct-fb show';
  } else {
    btn.classList.add('wrong');
    buttons[q.ans].classList.add('correct');
    feedback.textContent = 'Not quite. The correct answer is: ' + q.opts[q.ans];
    feedback.className = 'feedback wrong-fb show';
  }
  document.getElementById('scoreBadge').textContent = 'Score: ' + score + ' / ' + (current + 1);
  document.getElementById('nextBtn').className = 'next-btn show';
}

function showResults() {
  document.getElementById('cardHeader').className = 'card-header';
  document.getElementById('cardBody').className = 'card-body';
  document.getElementById('cardFooter').className = 'card-footer';
  document.getElementById('resultsScreen').className = 'results-screen show';
  var pct = Math.round((score / questions.length) * 100);
  document.getElementById('resultScore').textContent = score + ' / ' + questions.length;
  var icon, sub;
  if (pct >= 90) { icon = '🏆'; sub = "Outstanding! You're a true Cayman Islands expert!"; }
  else if (pct >= 75) { icon = '🌴'; sub = 'Excellent work! Strong all-round knowledge of the Cayman Islands.'; }
  else if (pct >= 60) { icon = '🏛️'; sub = 'Good effort! Review the weaker areas and try again.'; }
  else { icon = '🦀'; sub = 'Keep studying — there is so much fascinating history to discover!'; }
  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultSub').textContent = pct + '% — ' + sub;
  var breakdown = '<strong>Score by Post Test:</strong><br>';
  for (var src in scoreBySource) {
    var d = scoreBySource[src];
    var p = Math.round((d.correct / d.total) * 100);
    breakdown += src + ': ' + d.correct + '/' + d.total + ' (' + p + '%)<br>';
  }
  document.getElementById('resultBreakdown').innerHTML = breakdown;
}

function playAgain() {
  document.getElementById('resultsScreen').className = 'results-screen';
  startQuiz();
}

function goHome() {
  document.getElementById('resultsScreen').className = 'results-screen';
  document.getElementById('startScreen').style.display = '';
}

window.onload = function() {
  document.getElementById('startBtn').addEventListener('click', startQuiz);
  document.getElementById('nextBtn').addEventListener('click', function() {
    current++;
    if (current >= questions.length) showResults();
    else loadQuestion();
  });
  document.getElementById('playAgainBtn').addEventListener('click', playAgain);
  document.getElementById('goHomeBtn').addEventListener('click', goHome);
  var countBtns = document.querySelectorAll('.count-btn');
  for (var i = 0; i < countBtns.length; i++) {
    (function(btn, n) {
      btn.addEventListener('click', function() { selectCount(n, btn); });
    })(countBtns[i], parseInt(countBtns[i].getAttribute('data-count')));
  }
};
</script>
</body>
